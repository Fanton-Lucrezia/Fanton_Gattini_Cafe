<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>🐱 Gattini Cafe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>🐱 Gattini Cafe</h1>
<div id="status-bar">Non autenticato</div>

<!-- LOGIN -->
<section id="section-login">
  <h2>Login</h2>
  <input id="username" type="text" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Accedi</button>
  <button onclick="logout()" id="btn-logout" disabled>Logout</button>
  <div id="login-msg"></div>
</section>

<!-- MENU -->
<section>
  <h2>Menu</h2>
  <button onclick="caricaMenu()">Carica Menu</button>
  <div id="menu-container" style="margin-top:12px;"></div>
</section>

<!-- ORDINE -->
<section>
  <h2>Crea Ordine</h2>
  <input id="note-ordine" type="text" placeholder="Note (es. senza lattosio)" />
  <p style="font-size:0.85em;color:#666;margin-bottom:8px;">
    Seleziona i prodotti dal menu e imposta la quantità (0 = non incluso)
  </p>
  <button onclick="creaOrdine()">Invia Ordine</button>
  <div id="ordine-msg"></div>
</section>

<!-- RISPOSTA GREZZA -->
<section>
  <h2>Ultima risposta API</h2>
  <pre id="api-response">—</pre>
</section>

<script src="app.js"></script>
</body>
</html>
