<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>🐱 Gattini Cafe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #fff8f0; color: #333; padding: 20px; }
    h1 { color: #b5541b; margin-bottom: 20px; }
    h2 { margin: 20px 0 10px; color: #b5541b; }
    section { background: white; border-radius: 8px; padding: 16px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    input { padding: 8px; margin: 4px 0 8px; width: 100%; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; background: #b5541b; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 8px; }
    button:hover { background: #8f3f10; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: red; font-size: 0.9em; margin-top: 6px; }
    .success { color: green; font-size: 0.9em; margin-top: 6px; }
    .prodotto-card { border: 1px solid #eee; border-radius: 6px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .prodotto-card span { font-size: 0.9em; color: #666; }
    .prodotto-card input[type=number] { width: 60px; }
    #status-bar { background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 8px 12px; margin-bottom: 16px; font-size: 0.9em; display: none; }
    #status-bar.logged-in { background: #d4edda; border-color: #28a745; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 4px; font-size: 0.85em; overflow-x: auto; white-space: pre-wrap; }
  </style>
</head>
<body>

<h1>🐱 Gattini Cafe</h1>
<div id="status-bar">Non autenticato</div>

<!-- LOGIN -->
<section id="section-login">
  <h2>Login</h2>
  <input id="username" type="text" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Accedi</button>
  <button onclick="logout()" id="btn-logout" disabled>Logout</button>
  <div id="login-msg"></div>
</section>

<!-- MENU -->
<section>
  <h2>Menu</h2>
  <button onclick="caricaMenu()">Carica Menu</button>
  <div id="menu-container" style="margin-top:12px;"></div>
</section>

<!-- ORDINE -->
<section>
  <h2>Crea Ordine</h2>
  <input id="note-ordine" type="text" placeholder="Note (es. senza lattosio)" />
  <p style="font-size:0.85em;color:#666;margin-bottom:8px;">Seleziona i prodotti dal menu e imposta la quantità (0 = non incluso)</p>
  <button onclick="creaOrdine()">Invia Ordine</button>
  <div id="ordine-msg"></div>
</section>

<!-- RISPOSTA GREZZA -->
<section>
  <h2>Ultima risposta API</h2>
  <pre id="api-response">—</pre>
</section>

<script>
  const BASE_URL = 'http://127.0.0.1:8000/api';
  let accessToken = localStorage.getItem('access_token') || null;
  let prodottiDisponibili = [];

  // ── Aggiorna UI in base allo stato del token ──────────────────────────────
  function aggiornaStatusBar() {
    const bar = document.getElementById('status-bar');
    const username = localStorage.getItem('username') || '';
    if (accessToken) {
      bar.textContent = `✅ Autenticato come: ${username}`;
      bar.className = 'logged-in';
    } else {
      bar.textContent = '⚠️ Non autenticato — alcune operazioni non saranno disponibili';
      bar.className = '';
    }
    bar.style.display = 'block';
    document.getElementById('btn-logout').disabled = !accessToken;
  }

  function mostraRisposta(data) {
    document.getElementById('api-response').textContent = JSON.stringify(data, null, 2);
  }

  function setMsg(id, testo, tipo = 'error') {
    const el = document.getElementById(id);
    el.textContent = testo;
    el.className = tipo;
  }

  // ── Fetch con gestione token scaduto ─────────────────────────────────────
  async function apiFetch(url, options = {}) {
    options.headers = options.headers || {};
    if (accessToken) {
      options.headers['Authorization'] = 'Bearer ' + accessToken;
    }
    options.headers['Content-Type'] = 'application/json';

    let res = await fetch(url, options);

    // Token scaduto: prova a rinnovarlo
    if (res.status === 401) {
      const refreshed = await refreshToken();
      if (refreshed) {
        options.headers['Authorization'] = 'Bearer ' + accessToken;
        res = await fetch(url, options);
      } else {
        logout();
        throw new Error('Sessione scaduta. Esegui di nuovo il login.');
      }
    }
    return res;
  }

  // ── Auth ─────────────────────────────────────────────────────────────────
  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) {
      setMsg('login-msg', 'Inserisci username e password.');
      return;
    }

    try {
      const res = await fetch(`${BASE_URL}/auth/login/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      mostraRisposta(data);

      if (res.ok) {
        accessToken = data.access;
        localStorage.setItem('access_token', data.access);
        localStorage.setItem('refresh_token', data.refresh);
        localStorage.setItem('username', username);
        aggiornaStatusBar();
        setMsg('login-msg', 'Login effettuato con successo!', 'success');
      } else {
        setMsg('login-msg', data.detail || 'Credenziali non valide.');
      }
    } catch (e) {
      setMsg('login-msg', 'Errore di connessione. Il server è avviato?');
    }
  }

  async function refreshToken() {
    const refresh = localStorage.getItem('refresh_token');
    if (!refresh) return false;
    try {
      const res = await fetch(`${BASE_URL}/auth/token/refresh/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh }),
      });
      if (res.ok) {
        const data = await res.json();
        accessToken = data.access;
        localStorage.setItem('access_token', data.access);
        return true;
      }
    } catch (_) {}
    return false;
  }

  function logout() {
    accessToken = null;
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    localStorage.removeItem('username');
    aggiornaStatusBar();
    setMsg('login-msg', 'Logout effettuato.', 'success');
  }

  // ── Menu ─────────────────────────────────────────────────────────────────
  async function caricaMenu() {
    const container = document.getElementById('menu-container');
    container.innerHTML = 'Caricamento...';
    try {
      const [resCat, resProd] = await Promise.all([
        fetch(`${BASE_URL}/categorie/`),
        fetch(`${BASE_URL}/prodotti/?disponibile=true`),
      ]);
      const categorie = await resCat.json();
      const prodotti = await resProd.json();

      // Supporta sia risposta paginata che lista semplice
      const listaCat = categorie.results ?? categorie;
      const listaProd = prodotti.results ?? prodotti;
      prodottiDisponibili = listaProd;

      mostraRisposta({ categorie: listaCat, prodotti: listaProd });

      // Raggruppa prodotti per categoria
      let html = '';
      for (const cat of listaCat) {
        const prodottiCat = listaProd.filter(p => p.categoria === cat.id);
        if (prodottiCat.length === 0) continue;
        html += `<h3 style="margin:12px 0 6px;color:#555">${cat.nome}</h3>`;
        for (const p of prodottiCat) {
          html += `
            <div class="prodotto-card">
              <div>
                <strong>${p.nome}</strong><br>
                <span>${p.descrizione || ''}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <strong>€${p.prezzo.toFixed(2)}</strong>
                <input type="number" id="qty-${p.id}" min="0" value="0"
                  style="width:60px;padding:4px;" title="Quantità" />
              </div>
            </div>`;
        }
      }
      container.innerHTML = html || '<p>Nessun prodotto disponibile.</p>';
    } catch (e) {
      container.innerHTML = '<p class="error">Errore nel caricare il menu.</p>';
    }
  }

  // ── Ordine ────────────────────────────────────────────────────────────────
  async function creaOrdine() {
    if (!accessToken) {
      setMsg('ordine-msg', 'Devi fare il login prima di ordinare.');
      return;
    }
    if (prodottiDisponibili.length === 0) {
      setMsg('ordine-msg', 'Carica prima il menu.');
      return;
    }

    // Raccoglie i prodotti con quantità > 0
    const prodottiSelezionati = prodottiDisponibili
      .map(p => ({ prodotto_id: p.id, quantita: parseInt(document.getElementById(`qty-${p.id}`)?.value || 0) }))
      .filter(p => p.quantita > 0);

    if (prodottiSelezionati.length === 0) {
      setMsg('ordine-msg', 'Seleziona almeno un prodotto con quantità > 0.');
      return;
    }

    const note = document.getElementById('note-ordine').value.trim();

    try {
      const res = await apiFetch(`${BASE_URL}/ordini/`, {
        method: 'POST',
        body: JSON.stringify({ note, prodotti: prodottiSelezionati }),
      });
      const data = await res.json();
      mostraRisposta(data);

      if (res.ok) {
        setMsg('ordine-msg', `✅ Ordine #${data.id} creato! Totale: €${data.totale.toFixed(2)}`, 'success');
      } else {
        setMsg('ordine-msg', JSON.stringify(data));
      }
    } catch (e) {
      setMsg('ordine-msg', e.message || 'Errore nella creazione dell\'ordine.');
    }
  }

  // ── Inizializzazione ──────────────────────────────────────────────────────
  aggiornaStatusBar();
</script>
</body>
</html>
